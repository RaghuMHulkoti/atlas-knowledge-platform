# ==============================================================================
# Atlas - Enterprise Engineering Knowledge Platform
#
# Single-service stack: the FastAPI application. The vector store is Chroma
# Cloud and the LLM is OpenRouter, so no database or broker container is needed.
# Configuration (API keys, models) is read from the .env file.
# ==============================================================================

services:
  api:
    build: .
    image: atlas-knowledge-platform:latest
    container_name: atlas-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Persist cloned repositories and uploads across container restarts.
      - atlas-storage:/app/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/v1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  atlas-storage:
